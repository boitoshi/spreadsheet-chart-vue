name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: portfolio-dashboard/package-lock.json
      - name: Install dependencies
        working-directory: portfolio-dashboard
        run: npm ci
      - name: Lint (server)
        working-directory: portfolio-dashboard
        run: npm run lint -w server
      - name: Type check (server)
        working-directory: portfolio-dashboard
        run: npm run check -w server
      - name: Test (server)
        working-directory: portfolio-dashboard
        run: npm run test -w server

  collector-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Install dependencies
        working-directory: portfolio-dashboard/collector
        run: uv sync --dev
      - name: Ruff check
        working-directory: portfolio-dashboard/collector
        run: uv run ruff check .
      - name: Type check
        working-directory: portfolio-dashboard/collector
        run: uv run ty check

  deploy:
    needs: [lint-and-test, collector-lint]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: portfolio-dashboard/package-lock.json
      - name: Build
        working-directory: portfolio-dashboard
        run: npm ci && npm run build
      - name: Deploy to GCE
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.GCE_HOST }}
          username: deploy
          key: ${{ secrets.GCE_SSH_KEY }}
          script: |
            cd /app
            git pull origin main
            npm ci && npm run build
            cd collector && uv sync
            sudo systemctl restart portfolio
